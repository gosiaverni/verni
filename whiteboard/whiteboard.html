<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Verni – Whiteboard</title>
  <link rel="stylesheet" href="../home/home.css">
  <link rel="stylesheet" href="style.css" />

  <!-- opcjonalna czcionka -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Caveat:wght@400;700&family=Pacifico&family=Montserrat:wght@400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">

  <div class="sidebar-inner">

    <a href="../home/home.html" class="sidebar-logo">
      <img src="../assets/verni-logo.png" alt="Logo">
    </a>

    <nav class="sidebar-nav">

      <a href="../whiteboard/whiteboard.html">
        <img src="../assets/newproject-logo.png" alt="Nowy projekt">
      </a>

      <a href="../saved/saved.html">
        <img src="../assets/bookmarks-logo.png" alt="Zapisane">
      </a>

      <a href="../opportunities/opportunities.html">
        <img src="../assets/opportunities.png" alt="Opportunities">
      </a>

      <a href="../profil/profile.html">
        <img src="../assets/profile-logo.png" alt="Profil">
      </a>

    </nav>

  </div>

</aside>
<!-- ======================
     CONTROLS (GÓRA)
====================== -->


<div id="controls">
<div class="project-dropdown">
  <button id="btnProjectToggle" class="toolbar-btn">Projekt</button>

  <div id="projectPanel" class="project-panel hidden">

    <!-- wybór boarda -->
    
    <select id="boardSelect"></select>

    <!-- akcje -->
    <button id="btnNewBoard">Nowy board</button>
    <button id="btnRenameBoard">Zmień nazwę</button>

    <!-- public toggle -->
    <label class="toggle-row">
      <input type="checkbox" id="boardPublicToggle">
      Publiczny projekt
    </label>

    <button id="btnExportBoard">Eksportuj PNG</button>
    <button id="btnDeleteBoard" class="danger">Usuń</button>

  </div>
</div>
 <div class="insert-dropdown">
  <button id="btnInsertToggle" class="toolbar-btn">Wstaw</button>

  <div id="insertPanel" class="insert-panel hidden">
<button id="btnInsertShape">Wstaw kształt</button>
    <button id="btnInsertText">Wstaw tekst</button>

    <label class="file-btn">
      Wstaw plik
      <input type="file" id="boardImageInput">
    </label>

  </div>
</div>
  
<div class="bg-dropdown">
  <button id="btnBgToggle" class="toolbar-btn">Tło</button>

 <div id="bgPanel" class="bg-panel hidden">

  <label>Obraz</label>
  <input type="file" id="bgImageInput">

  <label>Kolor</label>
  <input type="color" id="bgColorInput">

  <label>Gradient</label>
  <input type="color" id="gradientFrom">
  <input type="color" id="gradientTo">

  <select id="gradientDirection">
    <option value="to bottom">↓</option>
    <option value="to right">→</option>
    <option value="to bottom right">↘</option>
    <option value="to top">↑</option>
  </select>

  <button id="btnApplyGradient">Ustaw gradient</button>

  <button id="btnResetBg">Reset</button>

</div>
</div>

<button id="btnUndo" class="toolbar-btn">↩</button>
<button id="btnRedo" class="toolbar-btn">↪</button>

<button id="btnZoomIn" class="toolbar-btn">+</button>
<button id="btnZoomOut" class="toolbar-btn">−</button>

<button id="btnResetView" class="toolbar-btn">Reset</button>


</div>





<!-- ======================
     BOARD
====================== -->

<div id="board">
  <div id="boardInner">
    <div id="boardBackgroundLayer"></div>
  </div>
</div>


<!-- ======================
     TOOLBAR (DOŁ)
====================== -->
<div id="bgEffectBar" class="bg-effect-bar hidden">
  <button data-effect="none">Brak</button>
  <button data-effect="light">Jasne</button>
  <button data-effect="dark">Ciemne</button>
  <button data-effect="blur">Blur</button>
</div>
<div id="boardToolbar" class="board-toolbar hidden">

  <button id="btnDelete" title="Usuń">🗑</button>
  <button id="btnUp" title="Warstwa w górę">⬆</button>
  <button id="btnDown" title="Warstwa w dół">⬇</button>

  <!-- TEKST -->
  <button id="btnTextBg" title="Tło tekstu">BG</button>
  <button id="btnBold" title="Pogrubienie"><b>B</b></button>
  <button id="btnItalic" title="Kursywa"><i>I</i></button>

  <button id="btnAlignLeft" title="Do lewej">⬅</button>
  <button id="btnAlignCenter" title="Wyśrodkuj">↔</button>
  <button id="btnAlignRight" title="Do prawej">➡</button>

  <!-- TRANSFORM -->
  <button id="btnRotateLeft" title="Obrót w lewo">⟲</button>
  <button id="btnRotateRight" title="Obrót w prawo">⟳</button>
  <button id="btnFlipX" title="Odbicie X">⇋</button>
  <button id="btnFlipY" title="Odbicie Y">⇵</button>

  <!-- BLOKADA -->
  <button id="btnLock" title="Zablokuj / odblokuj">🔒</button>

  <!-- TEKST -->
  <input
    id="bgOpacityInput"
    type="range"
    min="0"
    max="100"
    step="5"
    title="Przezroczystość tła tekstu"
  />

  <select id="fontSelect" title="Czcionka">
  <!-- podstawowe -->
  <option value="system-ui">System</option>
  <option value="serif">Serif</option>
  <option value="sans-serif">Sans</option>
  <option value="monospace">Mono</option>
  <option value="'League Spartan', sans-serif">League Spartan</option>

  <!-- nowe – inny styl -->
  <option value="'Playfair Display', serif">Playfair Display (elegancka)</option>
  <option value="'Montserrat', sans-serif">Montserrat (nowoczesna)</option>
  <option value="'Caveat', cursive">Caveat (ręczne pismo)</option>
  <option value="'Pacifico', cursive">Pacifico (script)</option>
  <option value="'Fira Code', monospace">Fira Code (tech)</option>
</select>


  <!-- OBRAZ -->
  <button id="btnShape" title="Kształt">🔲</button>
  <div id="shapePicker" class="shape-picker hidden">
  <button data-shape="square">⬛</button>
  <button data-shape="round">▢</button>
  <button data-shape="circle">⚫</button>
  <button data-shape="triangle">🔺</button>
  <button data-shape="star">⭐</button>
</div>

  <!-- KOLORY -->
  <input type="color" id="textColorInput" title="Kolor tekstu" />

  <input
    id="fontSizeInput"
    type="number"
    min="10"
    max="100"
    step="2"
    placeholder="px"
    title="Rozmiar tekstu"
  />

</div>
<div id="publicProjectModal" class="modal hidden">
  <div class="modal-content">
    <h2>Ustawienia projektu publicznego</h2>

    <label>Nazwa projektu</label>
    <input id="projectNameInput" type="text" />

    <label>Kategorie</label>
    <select id="projectCategory" multiple>
      <<option value="malarstwo">Malarstwo</option>
<option value="fotografia">Fotografia</option>
<option value="rzezba">Rzeźba</option>
<option value="rzemioslo">Rzemiosło</option>
<option value="design">Design</option>
<option value="moda">Moda</option>
<option value="inne">Inne</option>
    </select>

    <label>Hasztagi</label>
    <input id="projectTags" type="text" placeholder="#design, #moodboard" />

    <label>Opis</label>
    <textarea id="projectDescription"></textarea>

    <div class="modal-actions">
      <button id="saveProjectMeta">Zapisz</button>
      <button id="cancelProjectMeta">Anuluj</button>
    </div>
  </div>
</div>
<!-- ======================
     SCRIPT
====================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ TO DODAJ -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="../shared/supabaseClient.js"></script>
<script src="script3.js"></script>




</body>
</html>
