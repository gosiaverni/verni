<div class="opportunities-wrapper">

<header class="opportunities-header">
<h1>Opportunities</h1>
</header>


<div class="opportunities-container">


<h2>Dodaj ogłoszenie</h2>

<form id="jobForm" class="job-form">

<input name="title" placeholder="Tytuł ogłoszenia" required>
<input type="hidden" name="author_handle" id="authorHandle">

<input name="company" placeholder="Firma">

<textarea name="description" placeholder="Opis"></textarea>

<input name="location" placeholder="Lokalizacja">

<select name="type">
<option value="remote">Zdalna</option>
<option value="office">Stacjonarna</option>
<option value="hybrid">Hybrydowa</option>
</select>

<input name="salary" placeholder="Wynagrodzenie">

<input name="contact_email" placeholder="Email kontaktowy">

<button type="submit">Dodaj ogłoszenie</button>

</form>


<h2>Aktualne ogłoszenia</h2>

<div id="jobsContainer" class="jobs-list"></div>



</div>

</div>
